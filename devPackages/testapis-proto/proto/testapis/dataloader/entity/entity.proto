syntax = "proto3";

package testapis.dataloader.entity;

import "graphql/schema.proto";

message User {
  string id = 1 [(graphql.field).id = true];
  string name = 2;
}

message Order {
  int64 id = 1;
  string product_name = 2;
}

message BatchGetUsersRequest {
  repeated string ids = 1;
}

message BatchGetUsersResponse {
  repeated User users = 1;
}

message BatchGetUsersWithLocaleRequest {
  repeated string ids = 1;
  // `optional` => proto3Optional => not required (V9): loader `params` stays optional.
  optional string locale = 2;
}

message BatchGetUsersInTenantRequest {
  repeated string ids = 1;
  // Implicit presence scalar => required (V9): loader `params` becomes mandatory.
  string tenant_id = 2;
}

message BatchGetOrdersRequest {
  repeated int64 ids = 1;
}

message BatchGetOrdersResponse {
  repeated Order orders = 1;
}

service UserService {
  // Full inference: key_field=ids (only repeated field), entity_field=users
  // (only repeated message field). entity_key is explicit ("id"): the
  // `@key` fallback isn't available yet (it lands with federation support).
  rpc BatchGetUsers(BatchGetUsersRequest) returns (BatchGetUsersResponse) {
    option (graphql.rpc).batch = { entity_key: "id" };
  }

  // Same inference as BatchGetUsers, plus an optional non-key param.
  rpc BatchGetUsersWithLocale(BatchGetUsersWithLocaleRequest) returns (BatchGetUsersResponse) {
    option (graphql.rpc).batch = { entity_key: "id" };
  }

  // Same inference as BatchGetUsers, plus a required non-key param.
  rpc BatchGetUsersInTenant(BatchGetUsersInTenantRequest) returns (BatchGetUsersResponse) {
    option (graphql.rpc).batch = { entity_key: "id" };
  }

  // bigint keys (int64) and max_batch_size chunking.
  rpc BatchGetOrders(BatchGetOrdersRequest) returns (BatchGetOrdersResponse) {
    option (graphql.rpc).batch = { entity_key: "id", max_batch_size: 2 };
  }
}
